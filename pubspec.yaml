name: bms
description: Business Management System for retail and wholesale operations.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24

  # Secure storage for session tokens (replaces SharedPreferences for auth state)
  flutter_secure_storage: ^9.2.2

  # UUID generation (v7 time-ordered PKs -- keeps door open for future sync without a migration)
  uuid: ^4.4.2

  # Password hashing
  bcrypt: ^1.1.3

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # PDF generation and printing
  pdf: ^3.11.0
  printing: ^5.13.1

  # Local notifications (cheque reminders, debtor follow-ups)
  flutter_local_notifications: ^17.2.2

  # Charts
  fl_chart: ^0.68.0

  # Internationalisation and formatting
  intl: ^0.19.0

  # Immutable value objects
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
