name: bms
description: Business Management System for retail and wholesale operations.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Local database
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Secure storage for session tokens
  flutter_secure_storage: ^9.2.2

  # UUID generation (v7 time-ordered PKs)
  uuid: ^4.4.2

  # Password hashing
  bcrypt: ^1.1.3

  # Barcode scanning
  mobile_scanner: ^7.2.0

  # PDF generation and printing
  pdf: ^3.13.0
  printing: ^5.15.0

  # Local notifications (cheque reminders, debtor follow-ups)
  flutter_local_notifications: ^22.0.1

  # Charts
  fl_chart: ^0.68.0

  # Internationalisation and formatting
  intl: ^0.20.2

  # Immutable value objects
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Device fingerprinting + HTTP for licensing
  device_info_plus: ^11.1.0
  crypto: ^3.0.6
  http: ^1.3.0

  # Logging
  logger: ^2.4.0
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  image_picker: ^1.2.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
