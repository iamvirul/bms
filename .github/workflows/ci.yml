name: Build

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath bms-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: bms-windows
          path: bms-windows.zip
          retention-days: 14

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build macos --release

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - build/macos/Build/Products/Release/bms.app

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks ../../../../../bms-macos.zip bms.app

      - uses: actions/upload-artifact@v7
        with:
          name: bms-macos
          path: bms-macos.zip
          retention-days: 14

