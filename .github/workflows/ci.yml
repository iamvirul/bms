name: Build

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath bms-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: bms-windows
          path: bms-windows.zip
          retention-days: 14

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks ../../../../../bms-macos.zip bms.app

      - uses: actions/upload-artifact@v4
        with:
          name: bms-macos
          path: bms-macos.zip
          retention-days: 14

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build web --release --no-wasm

      - name: Package
        run: zip -r bms-web.zip build/web

      - uses: actions/upload-artifact@v4
        with:
          name: bms-web
          path: bms-web.zip
          retention-days: 14
